<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="OPRBguitar">
  <defs>
    <linearGradient id="bar" x1="0" x2="0" y1="6" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00d9ff" />
      <stop offset="0.48" stop-color="#7b35ff" />
      <stop offset="1" stop-color="#ff3fd2" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="54%">
      <stop offset="0" stop-color="#7b35ff" stop-opacity="0.75" />
      <stop offset="0.52" stop-color="#07112d" stop-opacity="0.92" />
      <stop offset="1" stop-color="#020413" />
    </radialGradient>
    <filter id="neon" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.2" result="blur" />
      <feColorMatrix
        in="blur"
        result="color"
        type="matrix"
        values="0 0 0 0 0.48 0 0 0 0 0.2 0 0 0 0 1 0 0 0 0.9 0"
      />
      <feMerge>
        <feMergeNode in="color" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="18" fill="url(#glow)" />
  <circle cx="32" cy="32" r="25" fill="none" stroke="#416cff" stroke-opacity="0.32" stroke-width="1.4" />
  <circle cx="32" cy="32" r="20" fill="none" stroke="#ff3fd2" stroke-opacity="0.28" stroke-width="1.2" />
  <g filter="url(#neon)" fill="url(#bar)">
    <rect x="12" y="26" width="4" height="12" rx="2" />
    <rect x="18" y="19" width="4" height="26" rx="2" />
    <rect x="24" y="11" width="4" height="42" rx="2" />
    <rect x="30" y="17" width="4" height="30" rx="2" />
    <rect x="36" y="8" width="4" height="48" rx="2" />
    <rect x="42" y="18" width="4" height="28" rx="2" />
    <rect x="48" y="24" width="4" height="16" rx="2" />
  </g>
  <circle cx="52" cy="22" r="2.4" fill="#00d9ff" opacity="0.95" />
</svg>
